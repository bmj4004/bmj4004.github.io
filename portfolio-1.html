            <br>

             Xsser, Xspear, Dalfox], and asset collection tools such as 
             [Katana, Paramspider, subfinder, and httpx]. Our team

             international platforms such as HackerOne and BugCamp."
            data-ko="XSStrike, Xsser, Xspear, Dalfox 등의 XSS fuzzer와

  <script>
    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-en], [data-ko]').forEach(el => {
        el.textContent = el.getAttribute(`data-${lang}`);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      const lang = localStorage.getItem('lang') || 'en';
      setLanguage(lang);
    });
  </script>
