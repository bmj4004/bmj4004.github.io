  <!-- set theme before paint (follows system unless the visitor chose one) -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem('bmj-theme');
        var dark = s === 'dark' || (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';

  <script>
    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-en], [data-ko]').forEach(el => {
        el.textContent = el.getAttribute(`data-${lang}`);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      const lang = localStorage.getItem('lang') || 'en';
      setLanguage(lang);
    });
  </script>
